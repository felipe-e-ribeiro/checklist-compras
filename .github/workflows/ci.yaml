name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: lista_compras_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Wait for PostgreSQL
        run: until pg_isready -h localhost -p 5432 -U test; do sleep 1; done

      - name: Run migrations
        working-directory: website
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: test
          DB_PASSWORD: test
          DB_NAME: lista_compras_test
          BCRYPT_ROUNDS: "1"
        run: npm run migrate

      - name: Run tests with coverage
        working-directory: website
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: test
          DB_PASSWORD: test
          DB_NAME: lista_compras_test
          JWT_SECRET: ci-test-secret
          BCRYPT_ROUNDS: "1"
          REDIS_HOST: redis://localhost:6379
          APP_URL: http://localhost:3000
          GOOGLE_CLIENT_ID: ci-client-id
          GOOGLE_CLIENT_SECRET: ci-client-secret
          GOOGLE_CALLBACK_URL: http://localhost:3000/auth/google/callback
          LOCAL_AUTH_ENABLED: "true"
          LOCAL_AUTH_USER: loadtest
          LOCAL_AUTH_PASSWORD: loadtest123
        # jest.config.js enforces 100% via coverageThreshold — jest exits non-zero if coverage drops
        run: npm run test:coverage

  trivy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t app:${{ github.sha }} .

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: app:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: false
