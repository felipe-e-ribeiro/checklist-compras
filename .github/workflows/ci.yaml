name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: lista_compras_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Run migrations
        working-directory: website
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_USER: test
          DB_PASSWORD: test
          DB_NAME: lista_compras_test
        run: npm run migrate

      - name: Run tests with coverage
        working-directory: website
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_USER: test
          DB_PASSWORD: test
          DB_NAME: lista_compras_test
          JWT_SECRET: ci-test-secret
          REDIS_HOST: redis://localhost:6379
          APP_URL: http://localhost:3000
          GOOGLE_CLIENT_ID: ci-client-id
          GOOGLE_CLIENT_SECRET: ci-client-secret
          GOOGLE_CALLBACK_URL: http://localhost:3000/auth/google/callback
        run: npm run test:coverage

      - name: Enforce 100% coverage
        working-directory: website
        run: |
          node -e "
            const s = require('./coverage/coverage-summary.json');
            const pct = s.total.lines.pct;
            if (pct < 100) { console.error('Coverage: ' + pct + '% — must be 100%'); process.exit(1); }
            console.log('Coverage OK: ' + pct + '%');
          "

  trivy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t app:${{ github.sha }} .

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: app:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: false

  build-and-push:
    runs-on: ubuntu-latest
    needs: [test, trivy]
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: feliperibeiro95
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v5
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          context: ./
          tags: |
            feliperibeiro95/checklist-compras:latest
            feliperibeiro95/checklist-compras:${{ github.event.release.tag_name }}
