name: CD

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          context: ./
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}

      - name: Verify image (pull from GHCR)
        run: docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}

  update-infra:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/checklist-compras-infra
          token: ${{ secrets.INFRA_PAT }}

      - name: Update image tag in values-prod.yaml
        run: |
          sed -i "s/^\(\s*tag:\s*\).*/\1${{ github.ref_name }}/" checklist-compras-infra/comprasweb/values-prod.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add values-prod.yaml
          git commit -m "chore: atualizar tag da imagem para ${{ github.ref_name }}"
          git push
