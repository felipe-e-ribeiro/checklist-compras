namespace: comprasweb-local
env: local

postgresql:
  enabled: true
  storage: 1Gi
  auth:
    username: compras
    password: compras123
    database: lista_compras

redis:
  enabled: true

comprasweb:
  replicaCount: 1
  image:
    repository: comprasweb-local
    tag: "latest"
    pullPolicy: Never         # usa imagem carregada localmente no kind
  port: 3000
  serviceName: comprasweb

  # Preencha googleClientId e googleClientSecret com suas credenciais reais
  jwtSecret: "local-dev-jwt-secret-change-me-in-prod"
  googleClientId: "YOUR_GOOGLE_CLIENT_ID"
  googleClientSecret: "YOUR_GOOGLE_CLIENT_SECRET"
  googleCallbackUrl: "http://compras.localhost/auth/google/callback"
  appUrl: "http://compras.localhost"

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 50

ingress:
  enabled: true
  ingressClassName: nginx
  rewriteTarget: /
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
  hosts:
    - host: compras.localhost
      paths:
        - path: /
          pathType: Prefix
          service: comprasweb
          port: 3000
  tls:
    enabled: false
