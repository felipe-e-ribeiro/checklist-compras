# NetworkPolicies: least privilege
# Topologia: internet → ingress-nginx → app → {postgres, redis, kube-dns}
# Nenhum pod inicia conexões para fora do cluster.

# ── 1. Deny-all padrão ────────────────────────────────────────────────
# Bloqueia todo tráfego não explicitamente permitido pelas policies abaixo.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

# ── 2. App: ingress do nginx ──────────────────────────────────────────
# Permite que o nginx ingress controller chame o app na porta 3000.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-app
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app: {{ .Values.comprasweb.serviceName | quote }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - podSelector: {}   # health checks do mesmo namespace
      ports:
        - port: {{ .Values.comprasweb.port }}
          protocol: TCP

# ── 3. App: egress para postgres, redis e DNS ─────────────────────────
# O app só pode conectar ao banco, ao redis e ao DNS do cluster.
# Nenhuma saída para a internet.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-app-egress
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app: {{ .Values.comprasweb.serviceName | quote }}
  policyTypes:
    - Egress
  egress:
    # PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app: "{{ .Release.Name }}-postgresql"
      ports:
        - port: 5432
          protocol: TCP
    # Redis
    - to:
        - podSelector:
            matchLabels:
              app: "{{ .Release.Name }}-redis"
      ports:
        - port: 6379
          protocol: TCP
    # DNS interno do cluster (kube-dns no namespace kube-system)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

# ── 4. PostgreSQL: só recebe do app e do migration job ────────────────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-ingress
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app: "{{ .Release.Name }}-postgresql"
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: {{ .Values.comprasweb.serviceName | quote }}
        - podSelector:
            matchLabels:
              app: "{{ .Release.Name }}-migrate"
      ports:
        - port: 5432
          protocol: TCP
  egress: []   # postgres não inicia conexões

# ── 5. Redis: só recebe do app ────────────────────────────────────────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis-ingress
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app: "{{ .Release.Name }}-redis"
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: {{ .Values.comprasweb.serviceName | quote }}
      ports:
        - port: 6379
          protocol: TCP
  egress: []   # redis não inicia conexões

# ── 6. Migration job: só pode conectar ao postgres e DNS ─────────────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-migrate-egress
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app: "{{ .Release.Name }}-migrate"
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: "{{ .Release.Name }}-postgresql"
      ports:
        - port: 5432
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
