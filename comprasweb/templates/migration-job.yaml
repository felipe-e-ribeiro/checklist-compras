apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ .Release.Name }}-migrate-{{ .Release.Revision }}"
  namespace: {{ .Values.namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
  labels:
    app: "{{ .Release.Name }}-migrate"
spec:
  backoffLimit: 4
  template:
    metadata:
      labels:
        app: "{{ .Release.Name }}-migrate"
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ .Release.Name }}-postgresql 5432; do
                echo "waiting for postgres..."
                sleep 2
              done
      containers:
        - name: migrate
          image: "{{ .Values.comprasweb.image.repository }}:{{ .Values.comprasweb.image.tag }}"
          imagePullPolicy: {{ .Values.comprasweb.image.pullPolicy | default "Always" }}
          workingDir: /opt/website
          command: ["npm", "run", "migrate"]
          env:
            - name: NODE_ENV
              value: "production"
            - name: DB_CLIENT
              value: "pg"
            - name: DB_HOST
              value: "{{ .Release.Name }}-postgresql"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: "compras-app-secret-{{ .Values.env }}"
                  key: db_user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "compras-app-secret-{{ .Values.env }}"
                  key: db_password
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: "compras-app-secret-{{ .Values.env }}"
                  key: db_name
